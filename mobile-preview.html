<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mobile Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }
    .phone {
      width: 393px;
      height: 852px;
      background: #1a1a1a;
      border-radius: 48px;
      border: 8px solid #333;
      box-shadow: 0 0 0 2px #555, 0 30px 80px rgba(0,0,0,0.8);
      overflow: hidden;
      position: relative;
    }
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #1a1a1a;
      border-radius: 0 0 20px 20px;
      z-index: 10;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 40px;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <iframe src="http://localhost:5173/?mobile=true"></iframe>
  </div>
</body>
</html>
